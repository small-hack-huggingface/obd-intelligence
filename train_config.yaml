# mlx_lm.lora config — Pocket Mechanic explainer fine-tune
# Run: .venv/bin/python -m mlx_lm lora -c train_config.yaml
model: models/gemma-4-E2B-it-4bit
train: true
data: data/mlx
fine_tune_type: lora
optimizer: adamw
mask_prompt: true            # loss on assistant answers only
num_layers: 16
batch_size: 2
grad_accumulation_steps: 4   # effective batch 8
iters: 2500                  # ~1.2 epochs over 4,157 examples
val_batches: 50
learning_rate: 1.0e-4
steps_per_report: 25
steps_per_eval: 250
adapter_path: adapters/pocket-mechanic
save_every: 250
max_seq_length: 2048
grad_checkpoint: true
seed: 42
lora_parameters:
  rank: 16
  dropout: 0.05
  scale: 20.0
